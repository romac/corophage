name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # Publish to crates.io
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Rust toolchain
        run: rustup update stable && rustup default stable

      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      - name: Package for crates.io
        run: cargo package --workspace --locked

      - name: Publish corophage-macros to crates.io
        run: cargo publish --locked -p corophage-macros || [[ $? -eq 101 ]]
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish corophage to crates.io
        run: cargo publish --locked -p corophage || [[ $? -eq 101 ]]
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
