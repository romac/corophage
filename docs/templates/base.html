<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{{ config.description }}">
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&family=Michroma&display=swap" rel="stylesheet">
  <link rel="help" type="text/plain" href="/llms.txt" title="LLM-friendly documentation">
  <link rel="help" type="text/plain" href="/llms-full.txt" title="LLM-friendly full documentation">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="{{ get_url(path='/') }}" class="nav-brand">corophage</a>
      <div class="nav-links">
        <a href="{{ get_section(path='docs/_index.md') | get(key='permalink') | safe }}">Docs</a>
        <a href="{{ config.extra.docs_rs_url | safe }}">API</a>
        <a href="{{ config.extra.repo_url | safe }}">GitHub</a>
        <a href="{{ config.extra.crates_url | safe }}">Crates.io</a>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>corophage is dual-licensed under <a href="http://opensource.org/licenses/MIT">MIT</a> and <a href="http://www.apache.org/licenses/LICENSE-2.0">Apache 2.0</a>.</p>
      <p><a href="/llms.txt">llms.txt</a></p>
    </div>
  </footer>
</body>
</html>
